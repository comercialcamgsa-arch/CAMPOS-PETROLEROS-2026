<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Petrolero Golfo de México</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* MAPA */
#map{
    height:100vh;
    width:100%;
}

/* PANEL */
#panel{
    position:absolute;
    top:15px;
    left:15px;
    width:280px;
    max-height:85vh;
    background:white;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    z-index:999;
    display:flex;
    flex-direction:column;
    transition:.3s;
}

.panel-cerrado{
    transform:translateX(-260px);
}

.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

#buscador{
    margin:0 15px 10px 15px;
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#listaCampos{
    list-style:none;
    padding:0;
    margin:0;
    overflow-y:auto;
}

#listaCampos li{
    padding:10px 15px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

#listaCampos li:hover{
    background:#f3f3f3;
}

#togglePanel{
    border:none;
    background:#eee;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
    <div class="panel-header">
        <h3>Campos Petroleros</h3>
        <button id="togglePanel">☰</button>
    </div>

    <input type="text" id="buscador" placeholder="Buscar campo...">
    <ul id="listaCampos"></ul>
</div>

<div id="map"></div>

<!-- LIBRERÍA CLUSTER -->
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

<!-- TU MAPA -->
<script src="mapa.js"></script>

<!-- GOOGLE MAPS -->
<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCLICgFgsKNMT1N6yl94Jb_K1B0Qdg4-x8&callback=initMap">
</script>

</body>
</html>
