<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Interno - Campos Petroleros</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

/* KPI BAR */
#kpiBar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:90px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  z-index:1000;
}

.kpi h4{
  margin:0;
  font-size:14px;
  color:#666;
}

.kpi span{
  font-size:22px;
  font-weight:bold;
  color:#1f2937;
}

/* MAPA */
#map{
    position:absolute;
    top:90px;
    left:0;
    right:0;
    bottom:0;
}

/* PANEL */
#panel{
    position:absolute;
    top:110px;
    left:15px;
    width:280px;
    max-height:70vh;
    background:white;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    z-index:999;
    display:flex;
    flex-direction:column;
}

.panel-header{
    padding:15px;
    font-weight:bold;
    border-bottom:1px solid #eee;
}

#operadorSelect{
    margin:10px 15px;
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#listaCampos{
    list-style:none;
    padding:0;
    margin:0;
    overflow-y:auto;
}

#listaCampos li{
    padding:10px 15px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

#listaCampos li:hover{
    background:#f3f3f3;
}
</style>
</head>

<body>

<!-- KPI BAR -->
<div id="kpiBar">
  <div class="kpi">
    <h4>Campos</h4>
    <span id="kpiCampos">0</span>
  </div>
  <div class="kpi">
    <h4>Aceite Total</h4>
    <span id="kpiAceite">0</span> bpd
  </div>
  <div class="kpi">
    <h4>Gas Total</h4>
    <span id="kpiGas">0</span> mmpcd
  </div>
</div>

<!-- PANEL -->
<div id="panel">
    <div class="panel-header">Operadores</div>

    <select id="operadorSelect">
        <option value="">Todos</option>
        <option value="Pemex">Pemex</option>
        <option value="ENI">ENI</option>
        <option value="Fieldwood">Fieldwood</option>
        <option value="Woodside">Woodside</option>
        <option value="Hokchi">Hokchi</option>
    </select>

    <ul id="listaCampos"></ul>
</div>

<div id="map"></div>

<script src="mapa.js"></script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCLICgFgsKNMT1N6yl94Jb_K1B0Qdg4-x8&callback=initMap">
</script>

</body>
</html>
