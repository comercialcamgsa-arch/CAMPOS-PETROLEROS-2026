<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Petrolero Golfo de México</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* MAPA */
#map{
    height:100vh;
    width:100%;
}

/* PANEL */
#panel{
    position:absolute;
    top:15px;
    left:15px;
    width:300px;
    max-height:90vh;
    background:white;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    z-index:999;
    display:flex;
    flex-direction:column;
    transition:.3s;
}

.panel-cerrado{
    transform:translateX(-280px);
}

.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

#buscador{
    margin:0 15px 10px 15px;
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#listaCampos{
    list-style:none;
    padding:0;
    margin:0;
    overflow-y:auto;
}

#listaCampos li{
    padding:10px 15px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

#listaCampos li:hover{
    background:#f3f3f3;
}

#togglePanel{
    border:none;
    background:#eee;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* DASHBOARD */
#dashboard{
    padding:0 15px 10px 15px;
    font-size:14px;
}

#filtros{
    padding:0 15px 10px 15px;
    font-size:14px;
}

</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
    <div class="panel-header">
        <h3>Campos Petroleros</h3>
        <button id="togglePanel">☰</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div><strong>Campos visibles:</strong> <span id="totalCampos">0</span></div>
        <div>🛢 Aceite total: <span id="totalAceite">0</span> bpd</div>
        <div>🔥 Gas total: <span id="totalGas">0</span> mmpcd</div>
    </div>

    <!-- BUSCADOR -->
    <input type="text" id="buscador" placeholder="Buscar campo...">

    <!-- FILTROS -->
    <div id="filtros">
        <strong>Operadores</strong><br>

        <label>
            <input type="checkbox" value="Pemex" checked> Pemex
        </label><br>

        <label>
            <input type="checkbox" value="ENI" checked> ENI
        </label><br>

        <label>
            <input type="checkbox" value="Fieldwood" checked> Fieldwood
        </label><br>

        <label>
            <input type="checkbox" value="Woodside" checked> Woodside
        </label><br>

        <label>
            <input type="checkbox" value="Hokchi" checked> Hokchi
        </label>
    </div>

    <!-- LISTA -->
    <ul id="listaCampos"></ul>
</div>

<!-- MAPA -->
<div id="map"></div>

<!-- LIBRERÍA CLUSTER -->
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

<!-- TU JS -->
<script src="mapa.js"></script>

<!-- GOOGLE MAPS -->
<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCLICgFgsKNMT1N6yl94Jb_K1B0Qdg4-x8&callback=initMap">
</script>

</body>
</html>
