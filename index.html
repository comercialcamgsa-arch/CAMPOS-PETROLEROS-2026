<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa Petrolero</title>

<style>
#map{
  height:100vh;
  width:100%;
}

#panel-filtros{
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  z-index:5;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<div id="panel-filtros">
  <b>Operadores</b><br>
  <label><input type="checkbox" value="Pemex" checked> Pemex</label><br>
  <label><input type="checkbox" value="ENI" checked> ENI</label><br>
  <label><input type="checkbox" value="Woodside" checked> Woodside</label><br>
  <label><input type="checkbox" value="Hokchi" checked> Hokchi</label><br>
  <label><input type="checkbox" value="Fieldwood" checked> Fieldwood</label><br>
  <label><input type="checkbox" value="Murphy" checked> Murphy</label>
</div>

<div id="map"></div>

<!-- ORDEN CORRECTO -->
<script src="puertos.js"></script>
<script src="mapa.js"></script>

<!-- GOOGLE MAPS SIEMPRE AL FINAL -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&callback=initMap">
</script>

</body>
</html>
